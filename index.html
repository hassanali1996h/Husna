<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مثلث الحسنة</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; padding:40px; }
input { padding:10px; font-size:18px; width:230px; }
button { padding:10px 20px; font-size:18px; margin-top:15px; cursor:pointer; }
.result { margin-top:30px; font-size:26px; color:#00ffcc; }
</style>
</head>

<body>

<h2>مثلث الحسنة</h2>

<input id="nameInput" placeholder="اكتب اسمك">
<br>
<button onclick="run()">اكشف مثلثك</button>

<div class="result" id="result"></div>

<script>

// 🔒 قائمتك كما هي (بعد حذف التكرار الحرفي فقط)
let rawNames = [
"الواحد","العفو","البر","الشهيد","الباری","اللطيف","العظيم","الجبار","الظاهر","الرقيب",
"الوهاب","الحليم","الصمد","القدوس","السلام","الكفيل","القهار","الواسع","الأول","المجيب",
"المتين","المجيد","الوكيل","الحق","الأخر","الحميد","الباطن","المبين","القريب","المؤمن",
"المهيمن","المصور","الهاد","الأحد","الودود","الخبير","الرأوف","الغنى","فعال لما يريد",
"رب المشرق و المغرب","أشد بأسا","رب المشرقين","رب المغربين","شديد المحال","خير ثوابا",
"ذي الطول","على كل شيء مقيت","رب السماوات والأرض","خير المنزلين","رب الأرض",
"رفيع الدرجات","المستعان على ما تصفون","جاعل الملائكة رسلا","خير الوارثين","رب الشعرى",
"ذو الجلال والاكرام","ذي المعارج","ذو الفضل","شديد العذاب","رب العالمين","غالب على أمره",
"أشد تنكيلا","خير الفاصلين","رب السماوات","بديع السماوات والأرض","فاطر السماوات والأرض",
"مخرج ما تحذرون","مخرج ما كنتم تكتمون","مخرج الميت من الحى","الغفور","العليم","الولى",
"بكل شيء عليم","ولى المؤمنين","الرحمن","الرحيم","الملك","ملك الناس","الخالق","الخلاق",
"رب الناس","شديد العقاب","سريع العقاب","الحسيب","أسرع الحاسبين","النصير","نعم النصير",
"القدير","أهل التقوى","القادر","الواق","الأعلى","العلى","الحكيم","أحكم الحاكمين",
"فالق الاصباح","رب الفلق","ذو العرش","ذي العرش","الكريم","الأكرم","الحي","محي الموتى",
"قابل التوب","التواب","الكبير","المتكبر","الحفيظ","خير حاف","خير الفات","خير الرازقين",
"الفتاح","الرزاق","القوي","ذو القوة","بصير بالعباد","البصير","العزيز","رب العزة",
"المحيط","محيط بالكافرين","القاهر فوق عباده","سميع الدعاء","ذو انتقام","السميع",
"القيوم","الشكور","نور السماوات والأرض","خير الماكرين","الشاكر","متم نوره","أسرع مكرا",
"عليم بذات الصدور","غافر الذنب","علام الغيوب","ولى المتقين","ارحم الراحمين","نعم المولى",
"ذو الرحمة","مالك الملك","خالق كل شيء","الله الناس","خير عقبا","سريع الحساب",
"خير الناصرين","المقتدر","المتعال","خير الحاكمين","فالق الحب والنوى","رب العرش",
"مالك يوم الدين","أحسن الخالقين","جامع الناس","ذو عقاب اليم","أهل المغفرة",
"واسع المغفرة","عالم الغيب والشهادة","الوال","خير الراحمين","مليك","خير الغافرين",
"بكل خلق عليم","ولى الذين أمنوا","ذو مغفرة"
];

// حذف التكرار الحرفي فقط
const allNames = [...new Set(rawNames)];

// فصل
const single = allNames.filter(n => !n.includes(" "));
const multi  = allNames.filter(n => n.includes(" "));

// 🔥 normalize (مع الحفاظ على الهمزة)
function normalize(str){
return str
.replace(/[ًٌٍَُِّْ]/g,'')
.replace(/[أإآ]/g,'ا')
.replace(/ى/g,'ي')
.replace(/ؤ/g,'و')
.replace(/ئ/g,'ي')
.replace(/\bال/g,'') // حذف "ال" فقط بالبداية
.replace(/\s/g,'');  // حذف الفراغات
}

// تسلسل
function hasSequence(name, input){
let i = 0;
for(let c of name){
if(c === input[i]) i++;
if(i === input.length) return true;
}
return false;
}

// تقييم
function scoreName(name, input, needed, isSingle){

let score = 0;

// تغطية
for(let ch of needed){
if(name.includes(ch)) score += 25;
}

// دعم الحروف الأولى
if(name.includes(input[0])) score += 15;
if(input[1] && name.includes(input[1])) score += 10;
if(name.includes(input[input.length-1])) score += 15;

// تسلسل
if(hasSequence(name, input)) score += 20;

// متتالية
if(name.includes(input)) score += 30;

// أولوية الفردي
if(isSingle) score += 20;

// تقليل المركب
if(!isSingle) score -= 10;

return score;
}

function pick(pool, used, needed, isSingle){

let best = null;

for(let n of pool){

if(used.includes(n)) continue;

let pure = normalize(n);
let s = scoreName(pure, input, needed, isSingle);

if(s <= 0) continue;

if(!best || s > best.score){
best = {name:n, score:s};
}
}

return best ? best.name : null;
}

let input;

function run(){

input = normalize(document.getElementById("nameInput").value);
if(!input) return;

let used = [];
let remaining = new Set(input.split(''));

// 1 البداية
let n1 = pick(single, used, new Set([input[0]]), true)
      || pick(multi, used, new Set([input[0]]), false);

if(n1){
used.push(n1);
normalize(n1).split('').forEach(c => remaining.delete(c));
}

// 2 النهاية
let n2 = pick(single, used, new Set([input[input.length-1]]), true)
      || pick(multi, used, new Set([input[input.length-1]]), false);

if(n2){
used.push(n2);
normalize(n2).split('').forEach(c => remaining.delete(c));
}

// 3 الإكمال
let n3 = pick(single, used, remaining, true)
      || pick(multi, used, remaining, false);

if(!n3){
n3 = pick(single, used, new Set(input.split('')), true)
   || pick(multi, used, new Set(input.split('')), false);
}

if(n3) used.push(n3);

// ضمان 3
while(used.length < 3){
let extra = pick(single, used, new Set(input.split('')), true)
         || pick(multi, used, new Set(input.split('')), false);
if(extra) used.push(extra);
else break;
}

document.getElementById("result").innerHTML =
used.join(" ✦ ");

}

</script>

</body>
</html>
